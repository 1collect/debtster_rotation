services:
  rotation-go:
    build: .
    env_file:
      - .env
    environment:
      - ADDR=:8040
      - SERVICE_TOKEN=${SERVICE_TOKEN:-debtster-rotation}
    ports:
      - "8040:8040"
    networks:
      - 1collekt_default
    restart: unless-stopped

networks:
  1collekt_default:
    external: true
